services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  filpe:
    build: .
    image: filpe:latest
    ports:
      - "8000:8000"
    environment:
      - FILPE_API_HOST=0.0.0.0
      - FILPE_API_PORT=8000
      - FILPE_BACKEND=rq
      - FILPE_VALKEY_URL=redis://valkey:6379/0
    depends_on:
      - valkey

  filpe-worker:
    build: .
    image: filpe:latest
    command: ["filpe-worker"]
    environment:
      - FILPE_BACKEND=rq
      - FILPE_VALKEY_URL=redis://valkey:6379/0
    depends_on:
      - valkey
